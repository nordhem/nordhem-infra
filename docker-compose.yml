version: "3.9"

networks:
  nordhem:
    driver: bridge

volumes:
  postgres_data:
  minio_data:

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: nordhem_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - nordhem
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: nordhem_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - nordhem
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO Init — creates buckets on first startup ─────────────────────────
  minio_init:
    image: minio/mc:latest
    container_name: nordhem_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/nordhem-lake;
      echo 'nordhem-lake bucket created.';
      exit 0;
      "
    networks:
      - nordhem

  # ── Trino ────────────────────────────────────────────────────────────────────
  trino:
    image: trinodb/trino:latest
    container_name: nordhem_trino
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./trino/config:/etc/trino
    networks:
      - nordhem
    depends_on:
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── Apache Superset ───────────────────────────────────────────────────────────
  superset:
    image: apache/superset:latest
    container_name: nordhem_superset
    restart: unless-stopped
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    ports:
      - "8088:8088"
    volumes:
      - ./superset/config:/app/pythonpath
    networks:
      - nordhem
    depends_on:
      - postgres
      - trino
